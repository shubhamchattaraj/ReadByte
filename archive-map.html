<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ReadByte | Archive Map</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/force-graph"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#050816;
color:white;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 20%,rgba(139,92,246,.25),transparent 25%),
radial-gradient(circle at 80% 30%,rgba(0,191,255,.20),transparent 25%),
radial-gradient(circle at 50% 80%,rgba(236,72,153,.15),transparent 30%);

z-index:-2;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
z-index:100;

backdrop-filter:blur(15px);
background:rgba(5,8,22,.85);

border-bottom:1px solid rgba(139,92,246,.25);
}

.nav-container{
max-width:1200px;
margin:auto;

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 30px;
}

.logo{
font-family:'Orbitron',sans-serif;
font-size:1.6rem;
font-weight:800;
letter-spacing:3px;
color:#8b5cf6;
}

.nav-links{
display:flex;
gap:30px;
}

.nav-links a{
text-decoration:none;
color:#d1d5db;
}

.nav-links a:hover{
color:#60a5fa;
}

.page-title{

position:absolute;
top:90px;
left:50%;

transform:translateX(-50%);

font-family:'Orbitron',sans-serif;

font-size:2rem;
letter-spacing:5px;

z-index:10;

color:#8b5cf6;
}

#graph{
width:100vw;
height:100vh;
}

#infoPanel{

position:absolute;

top:140px;
right:25px;

width:320px;

background:rgba(15,23,42,.85);

backdrop-filter:blur(20px);

border:1px solid rgba(139,92,246,.3);

padding:25px;

border-radius:20px;

z-index:50;
}

#infoPanel h3{
font-family:'Orbitron',sans-serif;
margin-bottom:15px;
color:#8b5cf6;
}

#infoPanel p{
line-height:1.7;
color:#cbd5e1;
}

.legend{

position:absolute;

bottom:20px;
left:20px;

background:rgba(15,23,42,.8);

padding:15px 20px;

border-radius:15px;

border:1px solid rgba(139,92,246,.25);

z-index:50;
}

.legend div{
margin-bottom:8px;
}

</style>
</head>

<body>

<nav>
<div class="nav-container">

<div class="logo">READBYTE</div>

<div class="nav-links">
<a href="home.html">Home</a>
<a href="fables.html">Fables</a>
<a href="poems.html">Poems</a>
<a href="series.html">Series</a>
<a href="novels.html">Novels</a>
<a href="archive-map.html">Archive Map</a>
<a href="universe.html">Universe Map</a>
</div>

</div>
</nav>

<div class="page-title">
ARCHIVE MAP
</div>

<div id="graph"></div>

<div id="infoPanel">

<h3>ARCHIVE DOSSIER</h3>

<p>
Select a node to inspect the network.
</p>

</div>

<div class="legend">

<div>✦ DOMAIN</div>
<div>⬢ LIBRARY</div>
<div>⬡ STORY</div>
<div>◈ POEM</div>
<div>⬣ UNIVERSE</div>
<div>◇ CATEGORY</div>
</div>

<script>

Promise.all([
    fetch("assets/data.json").then(r => r.json()),
    fetch("assets/series.json").then(r => r.json()),
    fetch("assets/novels.json").then(r => r.json())
]).then(([data, seriesData, novelData]) => {

const nodes = [];
const links = [];

nodes.push({
    id:"READBYTE",
    type:"domain"
});

nodes.push({
    id:"STORIES",
    type:"library"
});

nodes.push({
    id:"POEMS",
    type:"library"
});

nodes.push({
    id:"SERIES",
    type:"library"
});

nodes.push({
    id:"NOVELS",
    type:"library"
});

links.push({
    source:"READBYTE",
    target:"STORIES",
    type:"library"
});

links.push({
    source:"READBYTE",
    target:"POEMS",
    type:"library"
});

links.push({
    source:"READBYTE",
    target:"SERIES",
    type:"library"
});

links.push({
    source:"READBYTE",
    target:"NOVELS",
    type:"library"
});

const categorySet = new Set();

data.forEach(work=>{

    const nodeType =
        work.id.startsWith("P")
            ? "poem"
            : "story";

    nodes.push({

        id: work.title,

        type: nodeType,

        data: work

    });

    links.push({

        source:
            nodeType==="poem"
                ? "POEMS"
                : "STORIES",

        target: work.title,

        type:"library"

    });

    const universeId =
        work.title+"_UNIVERSE";

    nodes.push({

        id: universeId,

        name: work.universe,

        type:"universe"

    });

    links.push({

        source: work.title,

        target: universeId,

        type:"meta"

    });

    work.categories.forEach(category=>{

        const id =
            work.title+"_"+category;

        nodes.push({

            id,

            name:category,

            type:"category"

        });

        links.push({

            source:work.title,

            target:id,

            type:"meta"

        });

    });

});

function drawHexagon(
    ctx,
    x,
    y,
    radius
){

ctx.beginPath();

for(let i=0;i<6;i++){

    const angle =
    Math.PI/3 * i;

    const px =
    x + radius*Math.cos(angle);

    const py =
    y + radius*Math.sin(angle);

    if(i===0)
        ctx.moveTo(px,py);
    else
        ctx.lineTo(px,py);
}

ctx.closePath();

ctx.stroke();

}

const centerNode =
nodes.find(
    n => n.id === "READBYTE"
);

centerNode.fx = 0;
centerNode.fy = 0;

const storiesNode =
nodes.find(n => n.id === "STORIES");

const storyCenterX = -1000;
const storyCenterY = 0;

storiesNode.fx = storyCenterX;
storiesNode.fy = storyCenterY;

const poemsNode =
nodes.find(n => n.id === "POEMS");

const poemCenterX = 1500;
const poemCenterY = 0;

poemsNode.fx = poemCenterX;
poemsNode.fy = poemCenterY;

const seriesNode =
nodes.find(n => n.id === "SERIES");

seriesNode.fx = 0;
seriesNode.fy = 700;

const novelsNode =
nodes.find(n => n.id === "NOVELS");

novelsNode.fx = 0;
novelsNode.fy = -700;

const storyNodes =
nodes.filter(n=>n.type==="story");

const poemNodes =
nodes.filter(n=>n.type==="poem");

const ringSizes = [];

let size = 5;

while(size < storyNodes.length){

    ringSizes.push(size);

    size += 2;

}

const baseRadius = 120;
const gap = 90;

let current = 0;

ringSizes.forEach((ringCount,ring)=>{

    const radius =
        baseRadius + ring*gap;

    for(let i=0;i<ringCount;i++){

        if(current>=storyNodes.length)
            return;

        const node =
            storyNodes[current];

        const angle =
            (2*Math.PI*i)/ringCount +
            (ring%2)*Math.PI/ringCount;

        node.fx =
            storyCenterX +
            Math.cos(angle) * radius;

        node.fy =
            storyCenterY +
            Math.sin(angle) * radius;

        current++;

    }

});

const poemRingSizes = [];

let poemSize = 5;

while (poemSize < poemNodes.length) {

    poemRingSizes.push(poemSize);

    poemSize += 2;

}

const poemBaseRadius = 120;
const poemGap = 90;

let currentPoem = 0;

poemRingSizes.forEach((ringCount, ring) => {

    const radius = poemBaseRadius + ring * poemGap;

    for (let i = 0; i < ringCount; i++) {

        if (currentPoem >= poemNodes.length)
            return;

        const node = poemNodes[currentPoem];

        const angle =
            (2 * Math.PI * i) / ringCount +
            (ring % 2) * Math.PI / ringCount;

        node.fx =
            poemCenterX +
            Math.cos(angle) * radius;

        node.fy =
            poemCenterY +
            Math.sin(angle) * radius;

        currentPoem++;

    }

});

seriesData.forEach(series => {

    nodes.push({
        id: series.title,
        type: "series",
        data: series
    });

    links.push({
        source: "SERIES",
        target: series.title,
        type: "library"
    });

    series.parts.forEach(part => {

        const partId = series.id + "_" + part.id;

        nodes.push({
            id: partId,
            name: part.title,
            type: "part",
            data: part
        });

        links.push({
            source: series.title,
            target: partId,
            type: "part"
        });

    });

});

novelData.forEach(novel => {

    nodes.push({
        id: novel.title,
        type: "novel",
        data: novel
    });

    links.push({
        source: "NOVELS",
        target: novel.title,
        type: "library"
    });

    const universeId =
        novel.title + "_UNIVERSE";

    nodes.push({
        id: universeId,
        name: novel.universe,
        type: "universe"
    });

    links.push({
        source: novel.title,
        target: universeId,
        type: "meta"
    });

    novel.categories.forEach(category => {

        const id =
            novel.title + "_" + category;

        nodes.push({
            id,
            name: category,
            type: "category"
        });

        links.push({
            source: novel.title,
            target: id,
            type: "meta"
        });

    });

});

const novelNodes = nodes.filter(n => n.type === "novel");

const novelCenterX = 0;
const novelCenterY = -700;

if (novelNodes.length === 1) {

    novelNodes[0].fx = novelCenterX;
    novelNodes[0].fy = novelCenterY;

} else {

    let current = 0;
    let ring = 0;

    while (current < novelNodes.length) {

        const radius = 140 + ring * 90;

        const nodesThisRing = Math.min(
            6 + ring * 6,
            novelNodes.length - current
        );

        for (let i = 0; i < nodesThisRing; i++) {

            const angle = (2 * Math.PI * i) / nodesThisRing;

            novelNodes[current].fx =
                novelCenterX + Math.cos(angle) * radius;

            novelNodes[current].fy =
                novelCenterY + Math.sin(angle) * radius;

            current++;
        }

        ring++;
    }
}

const seriesNodes = nodes.filter(n => n.type === "series");

const seriesCenterX = 0;
const seriesCenterY = 700;

if(seriesNodes.length === 1){

    seriesNodes[0].fx = seriesCenterX;
    seriesNodes[0].fy = seriesCenterY + 140;

}
else{

    const radius = 140;

    seriesNodes.forEach((node,index)=>{

        const angle = (2*Math.PI*index)/seriesNodes.length;

        node.fx = seriesCenterX + Math.cos(angle)*radius;
        node.fy = seriesCenterY + Math.sin(angle)*radius;

    });

}

seriesData.forEach(series => {

    const seriesNode =
        nodes.find(n => n.id === series.title);

    const radius = 55;

    series.parts.forEach((part,index)=>{

        const node =
            nodes.find(n => n.id === series.id + "_" + part.id);

        const angle =
            (2*Math.PI*index)/series.parts.length;

        node.fx =
            seriesNode.fx +
            Math.cos(angle)*radius;

        node.fy =
            seriesNode.fy +
            Math.sin(angle)*radius;

    });

});

data.forEach(work=>{

    const workNode=
    nodes.find(n=>n.id===work.title);

    const universe=
    nodes.find(
        n=>n.id===work.title+"_UNIVERSE"
    );

    universe.fx=workNode.fx;
    universe.fy=workNode.fy+30;

    work.categories.forEach((category,index)=>{

        const node=
        nodes.find(
            n=>n.id===work.title+"_"+category
        );

        const angle=
        (2*Math.PI*index)/work.categories.length;

        node.fx=
        workNode.fx+
        Math.cos(angle)*45;

        node.fy=
        workNode.fy+
        Math.sin(angle)*45;

    });

});

data.forEach(work=>{

    const storyNode =
        nodes.find(n=>n.id===work.title);

    const radius = 32;

    work.categories.forEach((category,index)=>{

        const categoryNode =
            nodes.find(n=>n.id===category);

        if(!categoryNode) return;

        const angle =
            (2*Math.PI*index)/work.categories.length;

        categoryNode.fx =
            storyNode.fx +
            Math.cos(angle)*radius;

        categoryNode.fy =
            storyNode.fy +
            Math.sin(angle)*radius;

    });

});

const Graph = ForceGraph()
(document.getElementById('graph'))

.graphData({
nodes,
links
})

.d3AlphaDecay(1)
.cooldownTicks(0)

.backgroundColor('rgba(0,0,0,0)')

.nodeLabel(() => "")

.nodeCanvasObject((node, ctx, globalScale) => {

let label = "";

if(node.type === "domain"){
    label = "READBYTE";
}

else if(node.type === "library"){
    label = node.id;
}

else if(node.type === "universe"){
    label = "";
}

else if(node.type === "story" || node.type === "novel"){
    label = node.data.id;
}

else if(node.type === "poem"){
    label = node.data.id;
}

else if(node.type === "series"){
    label = node.data.id;
}

else if(node.type==="part"){
    label = node.data.id;
}

const fontSize = 9/globalScale;

ctx.font = `${fontSize}px Orbitron`;

ctx.textAlign = "left";
ctx.textBaseline = "middle";

if(node.type === "domain"){

    ctx.strokeStyle = "#00E5FF";
    ctx.lineWidth = 3;

    drawHexagon(
        ctx,
        node.x,
        node.y,
        18
    );

    ctx.shadowBlur = 25;
    ctx.shadowColor = "#00E5FF";
}

else if(node.type === "library"){

    ctx.strokeStyle="#22D3EE";
    ctx.lineWidth=3;

    drawHexagon(
        ctx,
        node.x,
        node.y,
        14
    );

    ctx.shadowBlur=20;
    ctx.shadowColor="#22D3EE";

}

else if(node.type === "universe"){

    ctx.strokeStyle = "#60A5FA";
    ctx.lineWidth = 2;

    drawHexagon(
        ctx,
        node.x,
        node.y,
        10
    );

    ctx.shadowBlur = 15;
    ctx.shadowColor = "#60A5FA";
}

else if(node.type === "story"){

    ctx.fillStyle = "#8B5CF6";

    ctx.beginPath();

    ctx.arc(
        node.x,
        node.y,
        5,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.shadowBlur = 15;
    ctx.shadowColor = "#8B5CF6";
}

else if(node.type==="poem"){

    ctx.fillStyle="#22D3EE";

    ctx.beginPath();

    ctx.arc(
        node.x,
        node.y,
        5,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.shadowBlur=15;
    ctx.shadowColor="#22D3EE";

}

else if(node.type==="series"){

    ctx.fillStyle="#EC4899";

    ctx.beginPath();

    ctx.arc(
        node.x,
        node.y,
        5,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.shadowBlur=15;
    ctx.shadowColor="#EC4899";
}

else if(node.type==="novel"){

    ctx.fillStyle="#F59E0B";

    ctx.beginPath();

    ctx.arc(
        node.x,
        node.y,
        5,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.shadowBlur=15;
    ctx.shadowColor="#F59E0B";

}

else if(node.type==="part"){

    ctx.fillStyle="#F472B6";

    ctx.beginPath();

    ctx.arc(
        node.x,
        node.y,
        3,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.shadowBlur=10;
    ctx.shadowColor="#F472B6";

}

else if(node.type === "category"){

    ctx.strokeStyle = "#EC4899";

    ctx.save();

    ctx.translate(
        node.x,
        node.y
    );

    ctx.rotate(Math.PI/4);

    ctx.strokeRect(
        -4,
        -4,
        8,
        8
    );

    ctx.restore();

    ctx.shadowBlur = 10;
    ctx.shadowColor = "#EC4899";
}

if(label){

    ctx.fillStyle = "#FFFFFF";

    ctx.fillText(
        label,
        node.x + 10,
        node.y
    );

}

})

.linkColor(link=>{

    if(link.source.id==="READBYTE")
        return "#00E5FF";

    if(link.type==="universe")
        return "#8B5CF6";

    return "#EC4899";

})

.linkWidth(link => {

if(link.type==="domain")
return 3;

if(link.type==="universe")
return 2;

return 1;

})

.linkDirectionalParticles(2)

.linkDirectionalParticleWidth(2)

.linkDirectionalParticleSpeed(0.004)

.onNodeClick(node => {

const panel =
document.getElementById("infoPanel");

if(node.type === "story" ||
   node.type === "poem" ||
   node.type === "series" ||
   node.type === "part" ||
   node.type === "novel"){

let details = "";

if(node.type === "series"){

    details = `
    Type: Series
    <br>
    ID: ${node.data.id}
    <br>
    Genres: ${node.data.genres.join(", ")}
    `;

}
else if(node.type === "part"){

    details = `
    Type: Series Part
    <br>
    ID: ${node.data.id}
    <br>
    Title: ${node.data.title}
    `;

}
else{

    details = `
    Type:
    ${
        node.type === "poem"
            ? "Poem"
        : node.type === "novel"
            ? "Novel"
            : "Story"
    }

    <br>
    ID: ${node.data.id}
    <br>
    Universe: ${node.data.universe}
    <br>
    Categories: ${node.data.categories.join(", ")}
    `;

}

panel.innerHTML = `

<img
src="${node.data.cover}"
style="
width:100%;
border-radius:12px;
margin-bottom:15px;
">

<h3>${node.id}</h3>

<p>
${details}
</p>

`;

}

else{

const title =
    node.type === "universe"
        ? node.name
        : node.id;

panel.innerHTML = `

<h3>${title}</h3>

<p>
Type:
${node.type}
</p>

`;

}

});

});

</script>

</body>
</html>
