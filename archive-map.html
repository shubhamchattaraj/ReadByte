<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ReadByte | Archive Map</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<script src="https://unpkg.com/force-graph"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Inter',sans-serif;
background:#050816;
color:white;
overflow:hidden;
}

body::before{
content:"";
position:fixed;
inset:0;

background:
radial-gradient(circle at 20% 20%,rgba(139,92,246,.25),transparent 25%),
radial-gradient(circle at 80% 30%,rgba(0,191,255,.20),transparent 25%),
radial-gradient(circle at 50% 80%,rgba(236,72,153,.15),transparent 30%);

z-index:-2;
}

nav{
position:fixed;
top:0;
left:0;
width:100%;
z-index:100;

backdrop-filter:blur(15px);
background:rgba(5,8,22,.85);

border-bottom:1px solid rgba(139,92,246,.25);
}

.nav-container{
max-width:1200px;
margin:auto;

display:flex;
justify-content:space-between;
align-items:center;

padding:20px 30px;
}

.logo{
font-family:'Orbitron',sans-serif;
font-size:1.6rem;
font-weight:800;
letter-spacing:3px;
color:#8b5cf6;
}

.nav-links{
display:flex;
gap:30px;
}

.nav-links a{
text-decoration:none;
color:#d1d5db;
}

.nav-links a:hover{
color:#60a5fa;
}

.page-title{

position:absolute;
top:90px;
left:50%;

transform:translateX(-50%);

font-family:'Orbitron',sans-serif;

font-size:2rem;
letter-spacing:5px;

z-index:10;

color:#8b5cf6;
}

#graph{
width:100vw;
height:100vh;
}

#infoPanel{

position:absolute;

top:140px;
right:25px;

width:320px;

background:rgba(15,23,42,.85);

backdrop-filter:blur(20px);

border:1px solid rgba(139,92,246,.3);

padding:25px;

border-radius:20px;

z-index:50;
}

#infoPanel h3{
font-family:'Orbitron',sans-serif;
margin-bottom:15px;
color:#8b5cf6;
}

#infoPanel p{
line-height:1.7;
color:#cbd5e1;
}

.legend{

position:absolute;

bottom:20px;
left:20px;

background:rgba(15,23,42,.8);

padding:15px 20px;

border-radius:15px;

border:1px solid rgba(139,92,246,.25);

z-index:50;
}

.legend div{
margin-bottom:8px;
}

</style>
</head>

<body>

<nav>
<div class="nav-container">

<div class="logo">READBYTE</div>

<div class="nav-links">
<a href="home.html">Home</a>
<a href="stories.html">Stories</a>
<a href="archive-map.html">Archive Map</a>
<a href="universe.html">Universe Map</a>
</div>

</div>
</nav>

<div class="page-title">
ARCHIVE MAP
</div>

<div id="graph"></div>

<div id="infoPanel">

<h3>ARCHIVE DOSSIER</h3>

<p>
Select a node to inspect the network.
</p>

</div>

<div class="legend">

<div>⬢ DOMAIN</div>
<div>⬣ UNIVERSE</div>
<div>◉ STORY</div>
<div>◇ CATEGORY</div>
</div>

<script>

fetch("assets/data.json")
.then(res => res.json())
.then(data => {

const nodes = [];
const links = [];

nodes.push({
    id: "READBYTE",
    type: "domain"
});

const universeSet = new Set();
const categorySet = new Set();

data.forEach(story => {

nodes.push({
id: story.title,
type: "story",
data: story
});

if(!universeSet.has(story.universe)){

nodes.push({
    id: story.universe,
    type: "universe"
});

links.push({
    source: "READBYTE",
    target: story.universe,
    type: "domain"
});

universeSet.add(story.universe);
}

links.push({
source: story.universe,
target: story.title,
type: "universe"
});

story.categories.forEach(category => {

if(!categorySet.has(category)){

nodes.push({
id: category,
type: "category"
});

categorySet.add(category);
}

links.push({
source: story.title,
target: category,
type: "category"
});

});

});

function drawHexagon(
    ctx,
    x,
    y,
    radius
){

ctx.beginPath();

for(let i=0;i<6;i++){

    const angle =
    Math.PI/3 * i;

    const px =
    x + radius*Math.cos(angle);

    const py =
    y + radius*Math.sin(angle);

    if(i===0)
        ctx.moveTo(px,py);
    else
        ctx.lineTo(px,py);
}

ctx.closePath();

ctx.stroke();

}

const centerNode =
nodes.find(
    n => n.id === "READBYTE"
);

centerNode.fx = 0;
centerNode.fy = 0;

const Graph = ForceGraph()
(document.getElementById('graph'))

.graphData({
nodes,
links
})

.backgroundColor('rgba(0,0,0,0)')

.nodeLabel(() => "")

.nodeCanvasObject((node, ctx, globalScale) => {

let label = "";

if(node.type === "domain"){
    label = "READBYTE";
}
else if(node.type === "story"){
    label = "B" + (nodes
        .filter(n => n.type === "story")
        .findIndex(n => n.id === node.id) + 1);
}

const fontSize = 9/globalScale;

ctx.font = `${fontSize}px Orbitron`;

ctx.textAlign = "left";
ctx.textBaseline = "middle";

if(node.type === "domain"){

    ctx.strokeStyle = "#00E5FF";
    ctx.lineWidth = 3;

    drawHexagon(
        ctx,
        node.x,
        node.y,
        18
    );

    ctx.shadowBlur = 25;
    ctx.shadowColor = "#00E5FF";
}

else if(node.type === "universe"){

    ctx.strokeStyle = "#60A5FA";
    ctx.lineWidth = 2;

    drawHexagon(
        ctx,
        node.x,
        node.y,
        10
    );

    ctx.shadowBlur = 15;
    ctx.shadowColor = "#60A5FA";
}

else if(node.type === "story"){

    ctx.fillStyle = "#8B5CF6";

    ctx.beginPath();

    ctx.arc(
        node.x,
        node.y,
        5,
        0,
        Math.PI*2
    );

    ctx.fill();

    ctx.shadowBlur = 15;
    ctx.shadowColor = "#8B5CF6";
}

else if(node.type === "category"){

    ctx.strokeStyle = "#EC4899";

    ctx.save();

    ctx.translate(
        node.x,
        node.y
    );

    ctx.rotate(Math.PI/4);

    ctx.strokeRect(
        -4,
        -4,
        8,
        8
    );

    ctx.restore();

    ctx.shadowBlur = 10;
    ctx.shadowColor = "#EC4899";
}

if(label){

    ctx.fillStyle = "#FFFFFF";

    ctx.fillText(
        label,
        node.x + 10,
        node.y
    );

}

})

.linkColor(link => {

if(link.type==="domain")
return "#00E5FF";

if(link.type==="universe")
return "#8B5CF6";

return "#EC4899";

})

.linkWidth(link => {

if(link.type==="domain")
return 3;

if(link.type==="universe")
return 2;

return 1;

})

.linkDirectionalParticles(2)

.linkDirectionalParticleWidth(2)

.linkDirectionalParticleSpeed(0.004)

.onNodeClick(node => {

const panel =
document.getElementById("infoPanel");

if(node.type === "story"){

panel.innerHTML = `

<img
src="${node.data.cover}"
style="
width:100%;
border-radius:12px;
margin-bottom:15px;
">

<h3>${node.id}</h3>

<p>

ID:
${node.data.id}

<br>

Universe:
${node.data.universe}

<br>

Categories:
${node.data.categories.join(", ")}

</p>

`;

}

else{

panel.innerHTML = `

<h3>${node.id}</h3>

<p>
Type:
${node.type}
</p>

`;

}

});

});

</script>

</body>
</html>
