<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ReadByte | Poems</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;800&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box
}
body{
    font-family:Inter,sans-serif;
    background:#050816;
    color:#fff
}
nav{
    position:sticky;
    top:0;background:rgba(5,8,22,.8);
    backdrop-filter:blur(15px);
    border-bottom:1px solid rgba(139,92,246,.25)
}
.nav-container{
    max-width:1200px;
    margin:auto;
    padding:20px 30px;
    display:flex;
    justify-content:space-between;
    align-items:center
}
.logo{
    font:800 1.8rem Orbitron,sans-serif;
    color:#8b5cf6
}
.nav-links{
    display:flex;
    gap:30px
}
.nav-links a{
    text-decoration:none;
    color:#d1d5db
}
.nav-links a:hover{
    color:#60a5fa
}
.hero{
    text-align:center;
    padding:80px 20px 40px
}
.hero h1{
    font-family:'Orbitron',sans-serif;
    font-size:clamp(3rem,7vw,5rem);
    letter-spacing:5px;

    background:linear-gradient(90deg,#8b5cf6,#60a5fa,#ec4899);

    -webkit-background-clip:text;
    background-clip:text;

    color:transparent;
    -webkit-text-fill-color:transparent;
}
.hero p{
    max-width:700px;
    margin:20px auto;
    color:#cbd5e1;
    line-height:1.8
}
.controls{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
    margin:20px
}
input,select{
    padding:14px;
    border-radius:12px;
    border:1px solid #60a5fa;
    background:#111827;
    color:#fff
}
.grid{
    max-width:1600px;
    margin:40px auto;
    padding:0 30px;
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:24px
}
.card{
    background:#111827;
    border:1px solid rgba(255,255,255,.08);
    border-radius:16px;
    overflow:hidden;
    cursor:pointer;
    transition:.3s
}
.card:hover{
    transform:translateY(-6px)
}
.card img{
    width:100%;
    aspect-ratio:9/16;
    object-fit:cover
}
.title{
    padding:16px;
    text-align:center;
    font-family:Orbitron,sans-serif
}
footer{
    text-align:center;
    padding:30px;
    color:#94a3b8
}
</style>
</head>
<body>
<nav><div class="nav-container">
<div class="logo">READBYTE</div>
<div class="nav-links">
<a href="home.html">Home</a>
<a href="fables.html">Fables</a>
<a href="poems.html">Poems</a>
<a href="series.html">Series</a>
<a href="novels.html">Novels</a>
<a href="archive-map.html">Archive Map</a>
<a href="universe.html">Universe Map</a>
</div></div></nav>

<section class="hero">
<h1>POETRY ARCHIVE</h1>
<p>Words condensed into emotion. Explore verses about love, solitude, dreams, hope, memories, and the unknown.</p>
</section>

<div class="controls">
<input id="search" placeholder="Search Poems...">
<select id="sort">
<option value="default">Archive Order</option>
<option value="az">A → Z</option>
<option value="za">Z → A</option>
</select>
</div>

<div class="grid" id="grid">

</div>

<footer>© 2026 ReadByte • Digital Archive of Original Poetry</footer>

<script>
let poems = [];

fetch("assets/data.json")
    .then(res => res.json())
    .then(data => {

        poems = data.filter(item => item.id.startsWith("P"));

        renderPoems(poems);

    });

function renderPoems(data) {

    const grid = document.getElementById("grid");

    grid.innerHTML = "";

    data.forEach(poem => {

        grid.innerHTML += `
            <div class="card"
                 onclick="location.href='reader.html?poem=${poem.id}'">

                <img
                    src="${poem.cover}"
                    alt="${poem.title}"
                    loading="lazy">

                <div class="title">
                    ${poem.title.toUpperCase()}
                </div>

            </div>
        `;

    });

}

const search = document.getElementById("search");

search.addEventListener("input", () => {

    const value = search.value.toLowerCase();

    const filtered = poems.filter(poem =>
        poem.title.toLowerCase().includes(value)
    );

    renderPoems(filtered);

});

const sort = document.getElementById("sort");

sort.addEventListener("change", () => {

    let sorted = [...poems];

    switch (sort.value) {

        case "az":
            sorted.sort((a, b) =>
                a.title.localeCompare(b.title)
            );
            break;

        case "za":
            sorted.sort((a, b) =>
                b.title.localeCompare(a.title)
            );
            break;

        default:
            sorted.sort((a, b) =>
                Number(a.id.slice(1)) -
                Number(b.id.slice(1))
            );
    }

    renderPoems(sorted);

});

</script>

</body>

</html>
