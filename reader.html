<!DOCTYPE html>

<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ReadByte Reader</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#050816;
color:#e5e7eb;
font-family:Georgia,serif;
min-height:100vh;
}

/* Progress Bar */
#progressBar{
position:fixed;
top:0;
left:0;

height:5px;
width:0%;

background:linear-gradient(
90deg,
#8b5cf6,
#60a5fa,
#ec4899
);

z-index:99999;
}

/* Background Glow */
body::before{
content:"";
position:fixed;
inset:0;
background:

radial-gradient(
circle at 20% 20%,
rgba(139,92,246,.12),
transparent 35%
),

radial-gradient(
circle at 80% 40%,
rgba(96,165,250,.08),
transparent 35%
);

z-index:-2;
}

/* Reader Panel */
.reader{
max-width:900px;
margin:80px auto;
padding:60px;
background:rgba(10,15,30,.88);
border-radius:24px;
border:1px solid rgba(139,92,246,.25);
backdrop-filter:blur(20px);
box-shadow:
0 0 30px rgba(139,92,246,.15),
0 0 80px rgba(96,165,250,.08);
}

/* Header */
.header{
text-align:center;
margin-bottom:50px;
}

.archive{
font-family:'Orbitron',sans-serif;
letter-spacing:4px;
font-size:.8rem;
color:#8b5cf6;
margin-bottom:15px;
}

#title{
    font-family:'Orbitron',sans-serif;
    font-size:3rem;
    font-weight:700;
    text-transform:uppercase;
    letter-spacing:5px;
    line-height:1.3;
    text-align:center;
    background:linear-gradient(
        90deg,
        #8b5cf6,
        #60a5fa,
        #ec4899
    );
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
    background-clip:text;
    text-shadow:
        0 0 20px rgba(139,92,246,.5);
    margin-bottom:20px;
}

/* Story Content */
#content{
font-size:1.15rem;
line-height:2;
white-space:pre-wrap;
}

.reader-tools{
    position:fixed;
    right:30px;
    top:50%;
    transform:translateY(-50%);
    display:flex;
    flex-direction:column;
    gap:15px;
    z-index:9999;
}

.reader-tools button{
    position:relative;
    width:52px;
    height:52px;
    border-radius:50%;
    border:1px solid rgba(96,165,250,.35);
    background:
        rgba(10,15,30,.85);
    color:#60a5fa;
    cursor:pointer;
    font-family:'Orbitron',sans-serif;
    backdrop-filter:blur(15px);
    transition:.3s;
    box-shadow:
        0 0 15px rgba(96,165,250,.15);
}

.reader-tools button:hover{
    transform:scale(1.1);
    color:white;
    border-color:#60a5fa;
    box-shadow:
        0 0 20px rgba(96,165,250,.6),
        0 0 40px rgba(139,92,246,.25);
}

.reader-tools button::after{
    content:attr(title);
    position:absolute;
    right:70px;
    top:50%;
    transform:translateY(-50%);
    padding:8px 14px;
    border-radius:8px;
    background:
        rgba(10,15,30,.95);
    border:1px solid rgba(96,165,250,.4);
    color:#60a5fa;
    font-family:'Orbitron',sans-serif;
    font-size:.7rem;
    letter-spacing:2px;
    white-space:nowrap;
    opacity:0;
    visibility:hidden;
    transition:.25s;
    pointer-events:none;
    box-shadow:
        0 0 15px rgba(96,165,250,.2);
}

.reader-tools button:hover::after{
    opacity:1;
    visibility:visible;
}

.light-mode{
    background:#f5f7fb;
    color:#111827;
}

.light-mode .reader{
    background:white;
    color:#111827;
}

.light-mode #content{
    color:#111827;
}

</style>

</head>

<body>

<div id="progressBar"></div>

<div class="reader">

<div class="header">

<div class="archive">
READBYTE DIGITAL ARCHIVE
</div>

<h1 id="title">Loading...</h1>

</div>

<div id="content">
Loading story...
</div>

</div>

<div class="reader-tools">

    <button id="homeBtn" title="Archive">
        ⌂
    </button>

    <button id="backBtn" title="Back">
        ←
    </button>

    <button id="topBtn" title="Top">
        ↑
    </button>

    <button id="fontPlus" title="Larger Text">
        A+
    </button>

    <button id="fontMinus" title="Smaller Text">
        A-
    </button>

    <button id="themeBtn" title="Theme">
        ◐
    </button>

    <button id="nextBtn" title="Next Story">
        →
    </button>

</div>

<script>

const params = new URLSearchParams(window.location.search);
const bookId = params.get("book");

fetch("assets/data.json")
.then(response => response.json())
.then(data => {

    const book = data.find(
        item => item.id === bookId
    );

    if(!book){
        throw new Error("Book not found");
    }

    document.getElementById("title").innerText =
        book.title;

    return fetch(
        `assets/books/${bookId}.md`
    );

})
.then(response => response.text())
.then(text => {

    document.getElementById("content").innerText =
        text;

})
.catch(error => {

    console.error(error);

    document.getElementById("title").innerText =
        "Error";

    document.getElementById("content").innerText =
        error.message;

});

let currentFontSize = 1.15;

document
.getElementById("homeBtn")
.addEventListener("click",()=>{

    window.location.href =
    "stories.html";

});

document
.getElementById("topBtn")
.addEventListener("click",()=>{

    window.scrollTo({
        top:0,
        behavior:"smooth"
    });

});

document
.getElementById("fontPlus")
.addEventListener("click",()=>{

    currentFontSize += 0.1;

    document
    .getElementById("content")
    .style.fontSize =
    currentFontSize + "rem";

});

document
.getElementById("fontMinus")
.addEventListener("click",()=>{

    currentFontSize =
    Math.max(
        0.9,
        currentFontSize - 0.1
    );

    document
    .getElementById("content")
    .style.fontSize =
    currentFontSize + "rem";

});

document
.getElementById("themeBtn")
.addEventListener("click",()=>{

    document.body.classList.toggle(
        "light-mode"
    );

});

document
.getElementById("nextBtn")
.addEventListener("click", () => {

    fetch("assets/data.json")
    .then(response => response.json())
    .then(data => {

        const currentIndex =
        data.findIndex(
            story => story.id === bookId
        );

        if(currentIndex === -1) return;

        const nextIndex =
        (currentIndex + 1) % data.length;

        const nextStory =
        data[nextIndex];

        window.location.href =
        `reader.html?book=${nextStory.id}`;

    });

});

document
.getElementById("backBtn")
.addEventListener("click",()=>{

    history.back();

});
</script>

</body>
</html>
